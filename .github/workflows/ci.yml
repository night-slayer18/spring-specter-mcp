name: Specter CI Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify (Maven)
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Ensure Code Formats and Models Compile
        run: mvn compile -pl specter-core,specter-server

  architecture-gate:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Project
        run: mvn clean compile --batch-mode --no-transfer-progress

      - name: Start Specter Server (HTTP mode)
        env:
          SPECTER_SOURCE_ROOT: ${{ github.workspace }}
          SPRING_PROFILES_ACTIVE: http
        run: |
          mvn -pl specter-server spring-boot:run \
            -Dspring-boot.run.arguments="--specter.source.root=${{ github.workspace }}" &
          echo "Waiting for Specter to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8765/specter/api/v1/graph/summary > /dev/null 2>&1; then
              echo "Specter is up"
              break
            fi
            sleep 2
          done

      - name: Run Architecture Gate
        run: |
          HEALTH=$(curl -s http://localhost:8765/specter/api/v1/health)
          SCORE=$(echo "$HEALTH" | jq -r '.overallScore')
          VIOLATIONS=$(curl -s "http://localhost:8765/specter/api/v1/graph/export?format=json" | \
            jq '[.edges[] | select(.type == "INJECTS") |
              select(any(.nodes[]; select(.type == "REPOSITORY"); .id == .targetId) and
                     any(.nodes[]; select(.type == "CONTROLLER"); .id == .sourceId))] | length')

          echo "Overall Health Score: $SCORE"
          echo "Architecture Violations: $VIOLATIONS"

          if [ "$SCORE" -lt 65 ]; then
            echo "::error::Architecture health score $SCORE is below threshold 65"
            exit 1
          fi

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::$VIOLATIONS direct controller→repository injections detected (ARCH-001 violation)"
            exit 1
          fi

          echo "Architecture gate passed — score: $SCORE/100"

      - name: Upload Architecture Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architecture-report
          path: .specter-cache/
          retention-days: 30

  pr-comment:
    runs-on: ubuntu-latest
    needs: architecture-gate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Project
        run: mvn clean compile --batch-mode --no-transfer-progress

      - name: Start Specter Server (HTTP mode)
        env:
          SPECTER_SOURCE_ROOT: ${{ github.workspace }}
          SPRING_PROFILES_ACTIVE: http
        run: |
          mvn -pl specter-server spring-boot:run \
            -Dspring-boot.run.arguments="--specter.source.root=${{ github.workspace }}" &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8765/specter/api/v1/graph/summary > /dev/null 2>&1; then
              echo "Specter is up"
              break
            fi
            sleep 2
          done

      - name: Post Architecture Report to PR
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const health = JSON.parse(execSync(
              'curl -s http://localhost:8765/specter/api/v1/health'
            ).toString());

            const dimensionRows = Object.entries(health.dimensions || {})
              .map(([key, d]) => `| ${d.name} | ${d.score}/100 |`)
              .join('\n');

            const criticalSection = health.criticalIssues && health.criticalIssues.length > 0
              ? health.criticalIssues.map(i => `- **${i.reason}** (${i.level}, score: ${i.score})`).join('\n')
              : '_No critical issues detected._';

            const recommendationsSection = health.recommendations && health.recommendations.length > 0
              ? health.recommendations.map(r => `- ${r}`).join('\n')
              : '_No recommendations._';

            const emoji = health.overallScore >= 80 ? '✅' : health.overallScore >= 65 ? '⚠️' : '❌';

            const body = `## 👻 Spring-Specter Architecture Report ${emoji}

            **Overall Score**: ${health.overallScore}/100

            | Dimension | Score |
            |-----------|-------|
            ${dimensionRows}

            **Critical Issues**:
            ${criticalSection}

            **Recommendations**:
            ${recommendationsSection}
            `;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
