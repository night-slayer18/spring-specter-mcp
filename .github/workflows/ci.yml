name: Specter CI Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify (Maven)
        run: mvn clean install --batch-mode --no-transfer-progress

  architecture-gate:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Project
        run: mvn install -DskipTests --batch-mode --no-transfer-progress

      - name: Run Architecture Gate
        run: |
          mvn test -pl specter-server \
            -Dtest=ArchitectureGateTest \
            -Dspecter.source.root="${{ github.workspace }}"

      - name: Upload Architecture Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architecture-report
          path: |
            .specter-cache/health-report.json
            .specter-cache/snapshots/
          retention-days: 30

  pr-comment:
    runs-on: ubuntu-latest
    needs: architecture-gate
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Project
        run: mvn install -DskipTests --batch-mode --no-transfer-progress

      - name: Generate Health Report
        run: |
          mvn test -pl specter-server \
            -Dtest=ArchitectureGateTest \
            -Dspecter.source.root="${{ github.workspace }}" || true

      - name: Post Architecture Report to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.specter-cache/health-report.json';

            if (!fs.existsSync(reportPath)) {
              console.log('No health report found at ' + reportPath);
              return;
            }

            const health = JSON.parse(fs.readFileSync(reportPath, 'utf-8'));

            const dimensionRows = Object.entries(health.dimensions || {})
              .map(([, d]) => `| ${d.name} | ${d.score}/100 |`)
              .join('\n');

            const criticalSection = health.criticalIssues && health.criticalIssues.length > 0
              ? health.criticalIssues.map(i => `- **${i.reason}** (${i.level}, score: ${i.score})`).join('\n')
              : '_No critical issues detected._';

            const recommendationsSection = health.recommendations && health.recommendations.length > 0
              ? health.recommendations.map(r => `- ${r}`).join('\n')
              : '_No recommendations._';

            const emoji = health.overallScore >= 80 ? '✅' : health.overallScore >= 65 ? '⚠️' : '❌';

            const body = `## 👻 Spring-Specter Architecture Report ${emoji}

            **Overall Score**: ${health.overallScore}/100
            **Graph**: ${health.nodeCount} nodes, ${health.edgeCount} edges

            | Dimension | Score |
            |-----------|-------|
            ${dimensionRows}

            **Critical Issues**:
            ${criticalSection}

            **Recommendations**:
            ${recommendationsSection}
            `;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
