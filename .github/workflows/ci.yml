name: Specter CI Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for JGit provenance checks

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify (Maven)
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Ensure Code Formats and Models Compile
        run: mvn compile -pl specter-core,specter-server
