spring.application.name=specter-server

# Virtual threads for heavy graph traversal
spring.threads.virtual.enabled=true

# MCP Server — STDIO transport
spring.ai.mcp.server.name=spring-specter-mcp
spring.ai.mcp.server.version=0.1.0
spring.ai.mcp.server.transport=STDIO

# Source root to analyze on startup (can be overridden via env var)
specter.source.root=${SPECTER_SOURCE_ROOT:./src}

# Logging
logging.level.com.specter=INFO
