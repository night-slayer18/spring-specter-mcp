spring.application.name=specter-server

# Virtual threads for heavy graph traversal
spring.threads.virtual.enabled=true

# Banner off — MCP STDIO must only output JSON-RPC on stdout
spring.main.banner-mode=off
# No web server in STDIO mode — web endpoints use the HTTP profile instead
spring.main.web-application-type=none

# MCP Server — STDIO transport
spring.ai.mcp.server.name=spring-specter-mcp
spring.ai.mcp.server.version=0.1.0
spring.ai.mcp.server.transport=STDIO

# Source root to analyze on startup (can be overridden via env var)
specter.source.root=${SPECTER_SOURCE_ROOT:./src}

# Logging — send to stderr so stdout stays clean for JSON-RPC
logging.level.com.specter=INFO

# Exclude WebSocket auto-config in STDIO mode (Jackson not on classpath)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.websocket.servlet.WebSocketMessagingAutoConfiguration,\
  org.springframework.boot.autoconfigure.websocket.servlet.WebSocketServletAutoConfiguration

# Actuator — expose health + metrics endpoints via JMX (STDIO has no HTTP)
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
management.metrics.export.simple.enabled=true
