# Specter HTTP/SSE Transport Configuration
spring.ai.mcp.server.transport=HTTP_SSE
spring.ai.mcp.server.port=8765

# REST API authentication
specter.api.auth.enabled=true
specter.api.auth.token=${SPECTER_API_TOKEN:changeme}

# Enable web MVC for REST management API
spring.main.web-application-type=servlet
